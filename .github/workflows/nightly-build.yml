name: Nightly Build and Deploy to QA

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: color-perception-spa
  QA_INSTANCE_ID: i-0db4adb06f60fb867

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: jsrahoi-dev/devops-spring26-midterm-source
          path: source

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::899088266694:role/GitHubActionsDeployRole
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Quality Checks
        id: quality
        run: |
          cd source

          # Frontend linting
          echo "🔍 Running frontend linting..."
          cd frontend
          npm ci
          npm run lint
          cd ..

          # Backend linting
          echo "🔍 Running backend linting..."
          cd backend
          npm ci
          npm run lint

          cd ..


          echo "✅ Quality checks passed!"

      - name: Build Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: nightly-${{ github.run_number }}
        run: |
          cd source
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

      - name: Run smoke tests
        id: smoke-test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: nightly-${{ github.run_number }}
        run: |
          cd source

          # Start test database
          docker run -d --name test-db -e MYSQL_ROOT_PASSWORD=test -e MYSQL_DATABASE=color_app mysql:8
          sleep 30

          # Start test app
          docker run -d --name test-app --link test-db:db \
            -e DB_HOST=db -e DB_USER=root -e DB_PASSWORD=test \
            -e DB_NAME=color_app -e SESSION_SECRET=test \
            -e NODE_ENV=production -p 3000:3000 \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          sleep 15

          # Test health endpoint
          echo "Testing /api/health..."
          curl -sf http://localhost:3000/api/health || exit 1

          # Test random color generation
          echo "Testing /api/colors/next..."
          curl -sf http://localhost:3000/api/colors/next | jq -e '.rgb_r' || exit 1

          # Test global stats
          echo "Testing /api/stats/global..."
          curl -sf http://localhost:3000/api/stats/global | jq -e '.totalClassifications' || exit 1

          # Test frontend loads
          echo "Testing frontend..."
          curl -sf http://localhost:3000/ | grep -iq "<!DOCTYPE html>" || exit 1

          echo "✅ All smoke tests passed!"

      - name: Push to ECR
        id: push-ecr
        if: success()
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: nightly-${{ github.run_number }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to QA
        id: deploy
        if: success()
        run: |
          QA_IP=$(aws ec2 describe-instances --instance-ids $QA_INSTANCE_ID --region $AWS_REGION --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          echo "#!/bin/bash" > deploy.sh
          echo "set -e" >> deploy.sh
          echo "aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin 899088266694.dkr.ecr.us-east-2.amazonaws.com" >> deploy.sh
          echo "" >> deploy.sh
          echo "# Create database if it does not exist" >> deploy.sh
          echo "sudo docker run --rm mysql:8 mysql -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} -e \"CREATE DATABASE IF NOT EXISTS color_app_qa;\"" >> deploy.sh
          echo "# Drop and recreate responses table with correct schema" >> deploy.sh
          echo "sudo docker run --rm mysql:8 mysql -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} color_app_qa -e \"DROP TABLE IF EXISTS responses;\"" >> deploy.sh





          echo "sudo docker pull 899088266694.dkr.ecr.us-east-2.amazonaws.com/color-perception-spa:latest" >> deploy.sh
          echo "sudo docker stop color-app 2>/dev/null || true" >> deploy.sh
          echo "sudo docker rm color-app 2>/dev/null || true" >> deploy.sh
          echo "sudo docker run -d --name color-app -p 3000:3000 -e DB_HOST=${{ secrets.DB_HOST }} -e DB_USER=${{ secrets.DB_USER }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e DB_NAME=color_app_qa -e SESSION_SECRET=${{ secrets.SESSION_SECRET }} -e NODE_ENV=production --restart unless-stopped 899088266694.dkr.ecr.us-east-2.amazonaws.com/color-perception-spa:latest" >> deploy.sh
          echo "echo Waiting for application to start..." >> deploy.sh
          echo "sleep 10" >> deploy.sh
          echo "echo Application logs:" >> deploy.sh
          echo "sudo docker logs color-app" >> deploy.sh
          echo "echo Checking database tables..." >> deploy.sh
          echo "sudo docker run --rm mysql:8 mysql -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} color_app_qa -e \"SHOW TABLES;\"" >> deploy.sh
          echo "sudo docker run --rm mysql:8 mysql -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} color_app_qa -e \"DESCRIBE responses;\" || echo \"Table does not exist\"" >> deploy.sh


          scp -i key.pem -o StrictHostKeyChecking=no deploy.sh ec2-user@$QA_IP:/tmp/

          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$QA_IP "bash /tmp/deploy.sh"
          rm -f key.pem

      - name: Verify deployment
        id: verify
        if: success()
        run: |
          sleep 5
          HEALTH=$(curl -sf https://qa.rahoi.dev/api/health || echo "failed")
          if echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "✅ Deployment verified successfully"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop test-app test-db 2>/dev/null || true
          docker rm test-app test-db 2>/dev/null || true

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failedStep = '${{ steps.quality.outcome }}' === 'failure' ? 'Quality Checks' :
                               '${{ steps.build.outcome }}' === 'failure' ? 'Build' :
                               '${{ steps.smoke-test.outcome }}' === 'failure' ? 'Smoke Tests' :
                               '${{ steps.push-ecr.outcome }}' === 'failure' ? 'Push to ECR' :
                               '${{ steps.deploy.outcome }}' === 'failure' ? 'Deploy to QA' :
                               '${{ steps.verify.outcome }}' === 'failure' ? 'Deployment Verification' :
                               'Unknown';
            
            const issueTitle = `❌ Nightly Build Failed - ${failedStep} Stage`;
            const issueBody = `## Nightly Build Failure Report
            
            **Failed Stage:** ${failedStep}
            **Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Triggered by:** ${{ github.event_name }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Time:** ${new Date().toISOString()}
            
            ### Stage Outcomes:
            - Quality Checks: ${{ steps.quality.outcome || 'skipped' }}
            - Build: ${{ steps.build.outcome || 'skipped' }}
            - Smoke Tests: ${{ steps.smoke-test.outcome || 'skipped' }}
            - Push to ECR: ${{ steps.push-ecr.outcome || 'skipped' }}
            - Deploy to QA: ${{ steps.deploy.outcome || 'skipped' }}
            - Verify Deployment: ${{ steps.verify.outcome || 'skipped' }}
            
            ### Quick Links:
            - [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [QA Environment](https://qa.rahoi.dev)
            - [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### Recommended Actions:
            1. Check the workflow logs for detailed error messages
            2. Verify AWS credentials and permissions
            3. Check EC2 instance status
            4. Review recent code changes
            
            ---
            *This issue was automatically created by the nightly build workflow.*
            `;
            
            // Check if there's already an open issue for today's build
            const today = new Date().toISOString().split('T')[0];
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'build-failure',
              per_page: 5
            });
            
            const todayIssue = existingIssues.data.find(issue => 
              issue.title.includes('Nightly Build Failed') && 
              issue.created_at.startsWith(today)
            );
            
            if (todayIssue) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: todayIssue.number,
                body: `Another failure in run #${{ github.run_number }}\n\n${issueBody}`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['build-failure', 'automated']
              });
            }

      - name: Send email notification on failure
        if: false  # Disabled - configure NOTIFICATION_EMAIL secret to enable
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFICATION_EMAIL }}
          password: ${{ secrets.NOTIFICATION_EMAIL_PASSWORD }}
          subject: "❌ Nightly Build Failed - Run #${{ github.run_number }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions <${{ secrets.NOTIFICATION_EMAIL }}>
          body: |
            Nightly Build Failed
            
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run Number: ${{ github.run_number }}
            
            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            QA Environment: https://qa.rahoi.dev
          convert_markdown: true

      - name: Post success summary
        if: success()
        run: |
          echo "### ✅ Nightly Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**QA Environment:** https://qa.rahoi.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All stages completed successfully:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Push to ECR" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deploy to QA" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deployment Verified" >> $GITHUB_STEP_SUMMARY
